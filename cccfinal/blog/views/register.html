<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>註冊 - My Blog</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="/" class="logo">My Blog</a>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <h1>註冊</h1>
      <% if (error) { %>
        <p class="form-error"><%= error %></p>
      <% } %>
      <form action="/register" method="POST">
        <div class="form-group">
          <label for="username">用戶名</label>
          <input type="text" id="username" name="username" required placeholder="輸入用戶名">
        </div>
        <div class="form-group">
          <label for="password">密碼</label>
          <input type="password" id="password" name="password" required placeholder="輸入密碼">
        </div>
        <button type="submit" class="btn btn-primary">註冊</button>
      </form>
      <p class="auth-footer">已有帳號？<a href="/login">登入</a></p>
    </div>
  </main>
</body>
</html>
