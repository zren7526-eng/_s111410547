<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><%= post ? '編輯文章' : '新文章' %> - My Blog</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="/" class="logo">My Blog</a>
      <nav>
        <a href="/">前台</a>
        <a href="/admin">文章列表</a>
        <a href="/logout">登出</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="admin-header">
      <h1><%= post ? '編輯文章' : '新文章' %></h1>
    </div>

    <form action="/admin/save" method="POST" id="postForm">
      <% if (post) { %>
        <input type="hidden" name="id" value="<%= post.id %>">
      <% } %>

      <div class="form-row">
        <div class="form-group">
          <label for="title">標題</label>
          <input type="text" id="title" name="title" value="<%= post ? post.title : '' %>" required placeholder="輸入文章標題">
        </div>
        <div class="form-group">
          <label for="cover_image">封面圖片 URL</label>
          <input type="url" id="cover_image" name="cover_image" value="<%= post ? post.cover_image : '' %>" placeholder="https://...">
        </div>
      </div>

      <div class="cover-preview" id="coverPreview" style="display: none;">
        <img id="coverImage" src="" alt="Cover preview">
      </div>

      <div class="form-group">
        <label for="tags">標籤（輸入後按 Enter 新增）</label>
        <div class="tags-input-container">
          <div class="tags-display" id="tagsDisplay"></div>
          <input type="text" id="tagsInput" placeholder="輸入標籤後按 Enter...">
        </div>
        <input type="hidden" name="tags" id="tagsHidden" value="<%= post ? post.tags : '' %>">
      </div>

      <div class="editor-container">
        <div class="editor-pane">
          <div class="editor-toolbar">
            <button type="button" class="toolbar-btn" data-action="bold" title="Ctrl+B 粗體"><strong>B</strong></button>
            <button type="button" class="toolbar-btn" data-action="italic" title="Ctrl+I 斜體"><em>I</em></button>
            <button type="button" class="toolbar-btn" data-action="heading" title="標題">H</button>
            <button type="button" class="toolbar-btn" data-action="link" title="Ctrl+K 連結">🔗</button>
            <button type="button" class="toolbar-btn" data-action="code" title="程式碼">&lt;/&gt;</button>
            <button type="button" class="toolbar-btn" data-action="quote" title="引用">""</button>
            <button type="button" class="toolbar-btn" data-action="list" title="列表">•</button>
          </div>
          <label for="content">文章內容（Markdown）</label>
          <textarea id="content" name="content" required placeholder="使用 Markdown 語法撰寫文章..."><%= post ? post.content : '' %></textarea>
        </div>
        <div class="preview-pane">
          <h3>預覽</h3>
          <div id="preview" class="post-body"></div>
        </div>
      </div>

      <div class="form-group" style="margin-top: 1.5rem;">
        <label>發布狀態</label>
        <div class="status-toggle">
          <label>
            <input type="radio" name="status" value="draft" <%= (!post || post.status === 'draft') ? 'checked' : '' %>>
            草稿
          </label>
          <label>
            <input type="radio" name="status" value="published" <%= (post && post.status === 'published') ? 'checked' : '' %>>
            發布
          </label>
        </div>
      </div>

      <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
        <button type="submit" name="status" value="draft" class="btn btn-secondary" id="saveDraftBtn">儲存草稿</button>
        <button type="submit" name="status" value="published" class="btn btn-primary" id="publishBtn">發布文章</button>
        <a href="/admin" class="btn btn-secondary" id="cancelBtn">取消</a>
      </div>
    </form>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <script>
    const STORAGE_KEY = 'blog_draft_<%= post ? post.id : "new" %>';
    
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      }
    });

    const contentEl = document.getElementById('content');
    const previewEl = document.getElementById('preview');
    const titleEl = document.getElementById('title');
    const coverInput = document.getElementById('cover_image');
    const coverPreview = document.getElementById('coverPreview');
    const coverImage = document.getElementById('coverImage');
    const tagsInput = document.getElementById('tagsInput');
    const tagsDisplay = document.getElementById('tagsDisplay');
    const tagsHidden = document.getElementById('tagsHidden');
    const form = document.getElementById('postForm');

    let tags = [];
    let originalContent = contentEl.value;
    let originalTitle = titleEl.value;
    let hasUnsavedChanges = false;

    function updatePreview() {
      const html = marked.parse(contentEl.value);
      previewEl.innerHTML = DOMPurify.sanitize(html);
      previewEl.querySelectorAll('pre code').forEach(block => {
        hljs.highlightElement(block);
      });
      
      if (contentEl.value !== originalContent || titleEl.value !== originalTitle) {
        hasUnsavedChanges = true;
      }
      
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        title: titleEl.value,
        content: contentEl.value,
        cover_image: coverInput.value,
        tags: tags.join(','),
        savedAt: new Date().toISOString()
      }));
    }

    function renderTags() {
      tagsDisplay.innerHTML = tags.map(tag => `
        <span class="tag-item">
          ${tag}
          <button type="button" class="tag-remove" data-tag="${tag}">&times;</button>
        </span>
      `).join('');
      tagsHidden.value = tags.join(',');
    }

    tagsInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const value = this.value.trim().replace(',', '');
        if (value && !tags.includes(value)) {
          tags.push(value);
          renderTags();
          this.value = '';
        }
      }
      if (e.key === 'Backspace' && !this.value && tags.length > 0) {
        tags.pop();
        renderTags();
      }
    });

    tagsDisplay.addEventListener('click', function(e) {
      if (e.target.classList.contains('tag-remove')) {
        const tag = e.target.dataset.tag;
        tags = tags.filter(t => t !== tag);
        renderTags();
      }
    });

    function insertMarkdown(before, after = '') {
      const start = contentEl.selectionStart;
      const end = contentEl.selectionEnd;
      const text = contentEl.value;
      const selected = text.substring(start, end);
      
      contentEl.value = text.substring(0, start) + before + selected + after + text.substring(end);
      contentEl.focus();
      contentEl.selectionStart = start + before.length;
      contentEl.selectionEnd = start + before.length + selected.length;
      updatePreview();
    }

    document.querySelectorAll('.toolbar-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const action = this.dataset.action;
        switch(action) {
          case 'bold': insertMarkdown('**', '**'); break;
          case 'italic': insertMarkdown('*', '*'); break;
          case 'heading': insertMarkdown('## '); break;
          case 'link': insertMarkdown('[', '](url)'); break;
          case 'code': insertMarkdown('```\n', '\n```'); break;
          case 'quote': insertMarkdown('> '); break;
          case 'list': insertMarkdown('- '); break;
        }
      });
    });

    contentEl.addEventListener('keydown', function(e) {
      if (e.ctrlKey || e.metaKey) {
        if (e.key === 'b') {
          e.preventDefault();
          insertMarkdown('**', '**');
        } else if (e.key === 'i') {
          e.preventDefault();
          insertMarkdown('*', '*');
        } else if (e.key === 'k') {
          e.preventDefault();
          insertMarkdown('[', '](url)');
        }
      }
    });

    coverInput.addEventListener('input', function() {
      if (this.value) {
        coverImage.src = this.value;
        coverImage.onload = () => coverPreview.style.display = 'block';
        coverImage.onerror = () => coverPreview.style.display = 'none';
      } else {
        coverPreview.style.display = 'none';
      }
    });

    if (coverInput.value) {
      coverImage.src = coverInput.value;
      coverImage.onload = () => coverPreview.style.display = 'block';
      coverImage.onerror = () => coverPreview.style.display = 'none';
    }

    if (tagsHidden.value) {
      tags = tagsHidden.value.split(',').map(t => t.trim()).filter(t => t);
      renderTags();
    }

    contentEl.addEventListener('input', updatePreview);
    titleEl.addEventListener('input', updatePreview);
    updatePreview();

    const savedDraft = localStorage.getItem(STORAGE_KEY);
    if (savedDraft && !<%= post ? 'true' : 'false' %>) {
      const draft = JSON.parse(savedDraft);
      if (draft.content && draft.content !== originalContent) {
        if (confirm('偵測到未儲存的草稿，是否恢復？')) {
          titleEl.value = draft.title || '';
          contentEl.value = draft.content || '';
          coverInput.value = draft.cover_image || '';
          if (draft.tags) {
            tags = draft.tags.split(',').map(t => t.trim()).filter(t => t);
            renderTags();
          }
          if (coverInput.value) {
            coverImage.src = coverInput.value;
            coverPreview.style.display = 'block';
          }
          updatePreview();
        }
      }
    }

    document.getElementById('cancelBtn').addEventListener('click', function(e) {
      if (hasUnsavedChanges) {
        if (!confirm('內容尚未儲存，確定要離開嗎？')) {
          e.preventDefault();
        }
      }
    });

    window.addEventListener('beforeunload', function(e) {
      if (hasUnsavedChanges) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    const publishBtn = document.getElementById('publishBtn');
    publishBtn.addEventListener('click', function() {
      document.querySelector('input[name="status"][value="published"]').checked = true;
      localStorage.removeItem(STORAGE_KEY);
      hasUnsavedChanges = false;
    });

    const saveDraftBtn = document.getElementById('saveDraftBtn');
    saveDraftBtn.addEventListener('click', function() {
      localStorage.removeItem(STORAGE_KEY);
      hasUnsavedChanges = false;
    });
  </script>
</body>
</html>
